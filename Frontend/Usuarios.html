<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class='nav-links'> 
    <div class='container'> 
      <span class='navbar-brand fw-bold'>Mi Sistema</span> 
      <div class='ms-auto d-flex align-items-center gap-3'> 
        <div><img src='' alt='Usuario' class='rounded-circle' width='30' height='30'></div>
        <span class='text-white' id='nombreUsuario'></span> 
        <a href="inicio.html" class='text-white'>Inicio</a>
        <a href="Dispositivos.html" class='text-white'>Dispositivos</a>
        <a href="Usuarios.html" class='text-white'>Usuarios</a>
        <a href="Tanques.html" class='text-white'>Tanques</a>
        <a href="Reportes.html" class='text-white'>Reportes</a>
        <a href="Tokens.html" class="text-white">Tokens ESP</a>
        <a href="Settings.html" class='text-white'>Configuración</a>
        <button class='btn btn-outline-light btn-sm' onclick='cerrarSesión()'> 
          Cerrar Sesión 
        </button> 
      </div> 
    </div> 
  </nav> 
  <main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Lista de Usuarios</h1>
      <button class="btn btn-success" onclick="window.location.href='usuarios-register.html'">
        <i class="bi bi-person-plus"></i> Registrar nuevo usuario
      </button>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar usuario...">
      </div>
      <div class="col-md-6 text-end">
        <div id="alerta"></div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle" id="tablaUsuarios">
        <thead class="table-primary">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
