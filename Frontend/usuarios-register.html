<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Usuario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="has-fixed-nav">
  <nav>
    <div class="nav-logo">SCA</div>
    <div class="nav-links">
      <a href="inicio.html">Inicio</a>
      <a href="Devices.html">Dispositivos</a>
      <a href="Usuarios.html" class="active">Usuarios</a>
      <a href="Tanques.html">Tanques</a>
      <a href="Mediciones.html">Mediciones</a>
      <a href="Reportes.html">Reportes</a>
      <a href="Token.html">Tokens ESP</a>
      <a href="Settings.html">Configuración</a>
    </div>
    <div class="nav-user">
      <span id="nombreUsuario"></span>
      <button class="nav-cta" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container" style="margin-top: 20px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 mb-0">Registrar nuevo usuario</h1>
      <button class="btn btn-secondary" onclick="window.location.href='Usuarios.html'">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
    </div>

    <div id="alerta"></div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <div class="card-body">
        <form id="formRegistroUsuario">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo *</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico *</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña *</label>
            <input type="password" class="form-control" id="password" name="password" required>
            <div class="form-text text-muted">Mínimo 6 caracteres</div>
          </div>
          <div class="mb-3">
            <label for="confirmar_password" class="form-label">Confirmar contraseña *</label>
            <input type="password" class="form-control" id="confirmar_password" required>
          </div>
          <div class="mb-3">
            <label for="rol" class="form-label">Rol *</label>
            <select class="form-select" id="rol" name="rol" required>
              <option value="usuario">Usuario</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Registrar usuario</button>
            <button type="button" class="btn btn-outline-secondary" onclick="window.location.href='Usuarios.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>...</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
  <script src="js/usuarios-register.js"></script>
</body>
</html>
