<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Usuario</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <span id="nombreUsuario"></span>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
  </nav>
  <main>
    <h1>Editar Usuario</h1>
    <form id="formEditar">
      <input type="hidden" name="id" id="usuarioId">
      <label>Nombre:<input type="text" name="nombre" id="nombre" required></label><br>
      <label>Email:<input type="email" name="email" id="email" required></label><br>
      <label>Rol:
        <select name="rol" id="rol" required>
          <option value="admin">Admin</option>
          <option value="usuario">Usuario</option>
        </select>
      </label><br>
      <button type="submit">Guardar cambios</button>
      <button type="button" onclick="window.location.href='Usuarios.html'">Cancelar</button>
    </form>
    <div id="alerta"></div>
  </main>
  <script src="js/usuarios-editar.js"></script>
</body>
</html>
