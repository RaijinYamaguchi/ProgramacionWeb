<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Registro</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link rel='stylesheet' href='css/styles.css'>
</head>
    <body>
        <div class='container py-5'>
        <div class='row justify-content-center'>
        <div class='col-md-4'>
                <div class='text-center mb-4'>
                <h2 class='fw-bold'>Crear Cuenta</h2>
                <p class='text-muted'>Completa los datos para registrarte</p>
                </div>
            <div id='alerta'></div>
            <div class='card shadow-sm'>
            <div class='card-body p-4'>
            <form onsubmit='event.preventDefault(); registro()'>
            <div class='mb-3'>
            <label class='form-label fw-semibold'>Nombre</label>
            <input type='text' id='inputNombre' class='form-control'
            placeholder='Tu nombre completo' autofocus>
            </div>
            <div class='mb-3'>
            <label class='form-label fw-semibold'>Email</label>
            <input type='email' id='inputEmail' class='form-control'
            placeholder='correo@ejemplo.com'>
            </div>
            <div class='mb-4'>
            <label class='form-label fw-semibold'>Password</label>
            <input type='password' id='inputPassword' class='form-control'
            placeholder='Minimo 6 caracteres'>
            </div>
            <div class='d-grid'>
            <button type='submit' class='btn btn-success' id='btnRegistro'>
            Registrarme
            </button>
            </div>
        </form>
        </div>
        </div>
        <p class='text-center mt-3 text-muted'>
        ¿Ya tienes cuenta? <a href='login.html'>Inicia sesión aqui</a>
        </p>
        </div>
        </div>
    </div>
    <script src='./js/registro.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
