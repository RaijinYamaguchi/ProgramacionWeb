<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Registro</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css'>
    <link rel='stylesheet' href='css/styles.css'>
</head>
<body class='has-fixed-nav'>
  <!-- Navbar del index -->
  <nav>
    <div class="nav-logo">SCA</div>
    <div class="nav-links">
      <a href="index.html#features">Características</a>
      <a href="index.html#funciones">Funciones</a>
      <a href="index.html#nosotros">Nosotros</a>
    </div>
    <button class="nav-cta" id="iniciar-sesion-btn" onclick="window.location.href='login.html'">Comenzar</button>
  </nav>

  <div class='container py-5' style="margin-top: 80px;">
    <div class='row justify-content-center'>
      <div class='col-md-4'>
        <div class='text-center mb-4'>
          <h2 class='fw-bold text-white'>Crear Cuenta</h2>
          <p class='text-white-50'>Completa los datos para registrarte</p>
        </div>
        <div id='alerta'></div>
        <div class='card shadow-sm'>
          <div class='card-body p-4'>
            <form onsubmit='event.preventDefault(); registro()'>
              <div class='mb-3'>
                <label class='form-label fw-semibold text-white'>Nombre</label>
                <input type='text' id='inputNombre' class='form-control' placeholder='Tu nombre completo' autofocus>
              </div>
              <div class='mb-3'>
                <label class='form-label fw-semibold text-white'>Email</label>
                <input type='email' id='inputEmail' class='form-control' placeholder='correo@ejemplo.com'>
              </div>
              <div class='mb-4'>
                <label class='form-label fw-semibold text-white'>Password</label>
                <input type='password' id='inputPassword' class='form-control' placeholder='Mínimo 6 caracteres'>
              </div>
              <div class='d-grid'>
                <button type='submit' class='btn btn-success' id='btnRegistro'>Registrarme</button>
              </div>
            </form>
          </div>
        </div>
        <p class='text-center mt-3 text-white-50'>
          ¿Ya tienes cuenta? <a href='login.html' class='text-info'>Inicia sesión aquí</a>
        </p>
      </div>
    </div>
  </div>
  <script src='./js/registro.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
