<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Tanque</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class='nav-links'> 
    <div class='container'> 
      <span class='navbar-brand fw-bold'>Mi Sistema</span> 
      <div class='ms-auto d-flex align-items-center gap-3'> 
        <div><img src='' alt='Usuario' class='rounded-circle' width='30' height='30'></div>
        <span class='text-white' id='nombreUsuario'></span> 
        <a href="inicio.html" class='text-white'>Inicio</a>
        <a href="Dispositivos.html" class='text-white'>Dispositivos</a>
        <a href="Usuarios.html" class='text-white'>Usuarios</a>
        <a href="Tanques.html" class='text-white'>Tanques</a>
        <a href="Reportes.html" class='text-white'>Reportes</a>
        <a href="Tokens.html" class="text-white">Tokens ESP</a>
        <a href="Settings.html" class='text-white'>Configuración</a>
        <button class='btn btn-outline-light btn-sm' onclick='cerrarSesión()'> 
          Cerrar Sesión 
        </button> 
      </div> 
    </div> 
  </nav> 
  <main class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">
            <h2 class="card-title mb-4">Nuevo Tanque</h2>
            <div id="alerta"></div>
            <form id="formRegistro">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre del Tanque</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Tanque Principal" required>
              </div>
              <div class="mb-3">
                <label for="ubicacion" class="form-label">Ubicación</label>
                <input type="text" class="form-control" id="ubicacion" name="ubicacion" placeholder="Ej: Azotea" required>
              </div>
              <div class="mb-3">
                <label for="capacidad_max" class="form-label">Capacidad Máxima (litros)</label>
                <input type="number" class="form-control" id="capacidad_max" name="capacidad_max" placeholder="5000" required>
              </div>
              <div class="mb-3">
                <label for="nivel_min_alerta" class="form-label">Nivel Mínimo de Alerta (litros)</label>
                <input type="number" class="form-control" id="nivel_min_alerta" name="nivel_min_alerta" placeholder="500">
              </div>
              <div class="mb-3">
                <label for="nivel_max_alerta" class="form-label">Nivel Máximo de Alerta (litros)</label>
                <input type="number" class="form-control" id="nivel_max_alerta" name="nivel_max_alerta" placeholder="4500">
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">Registrar Tanque</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='Tanques.html'">Cancelar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/tanques-register.js"></script>
</body>
</html>
