<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Gestión de Mediciones</span>
      <div class="d-flex align-items-center ms-auto">
        <span class="text-white me-3" id="nombreUsuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="container-mediciones">
    <!-- Sidebar con lista de tanques -->
    <aside class="sidebar-tanques">
      <h5>Tanques</h5>
      <ul class="list-tanques" id="listaTanques">
        <li class="spinner-container">
          <div class="spinner-border spinner-border-sm" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </li>
      </ul>
    </aside>

    <!-- Contenido: Tabla de mediciones -->
    <main class="content-mediciones">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Mediciones</h1>
        <button class="btn btn-success btn-sm" onclick="recargarMediciones()" title="Recargar mediciones">
          ↻ Actualizar
        </button>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle tabla-mediciones" id="tablaMediciones">
          <thead class="table-primary">
            <tr>
              <th>ID</th>
              <th>Tanque</th>
              <th>Dispositivo</th>
              <th>Temperatura (°C)</th>
              <th>Humedad (%)</th>
              <th>Lectura</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="bodyMediciones">
            <tr>
              <td colspan="8" class="text-center text-muted py-4">
                Selecciona un tanque para ver sus mediciones
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>

  <script src="js/mediciones.js"></script>
</body>
</html>
