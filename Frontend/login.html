<!DOCTYPE html> 
<html lang='es'> 
<head> 
  <meta charset='UTF-8'> 
  <meta name='viewport' content='width=device-width, initial-scale=1.0'> 
  <title>Iniciar Sesión</title> 
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' rel='stylesheet'>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css'>
  <link rel='stylesheet' href='css/styles.css'>
</head> 
<body class='has-fixed-nav'>
  <!-- Navbar del index -->
  <nav>
    <div class="nav-logo">SCA</div>
    <div class="nav-links">
      <a href="index.html#features">Características</a>
      <a href="index.html#funciones">Funciones</a>
      <a href="index.html#nosotros">Nosotros</a>
    </div>
    <button class="nav-cta" id="iniciar-sesion-btn" onclick="window.location.href='login.html'">Comenzar</button>
  </nav>

  <div class='container py-5' style="margin-top: 80px;"> 
    <div class='row justify-content-center'> 
      <div class='col-md-4'> 
        <div class='text-center mb-4'> 
          <h2 class='fw-bold text-white'>Iniciar Sesión</h2> 
          <p class='text-white-50'>Ingresa tus credenciales para continuar</p> 
        </div> 
        <div id='alerta'></div> 
        <div class='card shadow-sm'> 
          <div class='card-body p-4'> 
            <form onsubmit='event.preventDefault(); login()'> 
              <div class='mb-3'> 
                <label class='form-label fw-semibold text-white'>Email</label> 
                <input type='email' id='inputEmail' class='form-control' placeholder='correo@ejemplo.com' autofocus> 
              </div> 
              <div class='mb-4'> 
                <label class='form-label fw-semibold text-white'>Password</label> 
                <input type='password' id='inputPassword' class='form-control'> 
              </div> 
              <div class='d-grid'> 
                <button type='submit' class='btn btn-primary' id='btnLogin'>Ingresar</button> 
              </div> 
            </form> 
          </div> 
        </div> 
        <p class='text-center mt-3 text-white-50'> 
          ¿No tienes cuenta? <a href='registro.html' class='text-info'>Regístrate aquí</a> 
        </p> 
      </div> 
    </div> 
  </div> 
  <script src='./js/login.js'></script> 
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js'></script> 
</body>
</html>
