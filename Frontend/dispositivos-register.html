<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Dispositivo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="has-fixed-nav">
  <nav>
    <div class="nav-logo">SCA</div>
    <div class="nav-links">
      <a href="inicio.html">Inicio</a>
      <a href="Devices.html" class="active">Dispositivos</a>
      <a href="Usuarios.html">Usuarios</a>
      <a href="Tanques.html">Tanques</a>
      <a href="Mediciones.html">Mediciones</a>
      <a href="Reportes.html">Reportes</a>
      <a href="Token.html">Tokens ESP</a>
      <a href="Settings.html">Configuración</a>
    </div>
    <div class="nav-user">
      <span id="nombreUsuario"></span>
      <button class="nav-cta" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container" style="margin-top: 20px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 mb-0">Registrar nuevo dispositivo</h1>
      <button class="btn btn-secondary" onclick="window.location.href='Devices.html'">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
    </div>

    <div id="alerta"></div>

    <div class="card" style="max-width: 700px; margin: 0 auto;">
      <div class="card-body">
        <form id="formRegistroDispositivo">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del dispositivo *</label>
            <input type="text" class="form-control" id="nombre" required placeholder="Ej: Sensor de agua principal">
          </div>
          <div class="mb-3">
            <label for="ubicacion" class="form-label">Ubicación *</label>
            <input type="text" class="form-control" id="ubicacion" required placeholder="Ej: Azotea, sótano, jardín...">
          </div>
          <div class="mb-3">
            <label for="funcionalidad" class="form-label">Funcionalidad</label>
            <input type="text" class="form-control" id="funcionalidad" placeholder="Ej: Medición de nivel, bomba...">
          </div>
          <div class="mb-3">
            <label for="usuario_id" class="form-label">Usuario propietario *</label>
            <select class="form-select" id="usuario_id" required>
              <option value="">Seleccione un usuario...</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="tanque_id" class="form-label">Tanque asociado *</label>
            <select class="form-select" id="tanque_id" required>
              <option value="">Seleccione un tanque...</option>
            </select>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="activo" checked>
            <label class="form-check-label" for="activo">Activo</label>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Registrar dispositivo</button>
            <button type="button" class="btn btn-outline-secondary" onclick="window.location.href='Dispositivos.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">SCA</div>
    <div class="footer-copy">© 2025 Sistema de Control de Agua. S.L.P, MX.</div>
    <div class="footer-links">
      <a href="privacidad.html">Privacidad</a>
      <a href="terminos.html">Términos</a>
      <a href="https://w.app/ewelgl">Contacto</a>
      <a href="https://github.com/RaijinYamaguchi/ProgramacionWeb">GitHub</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
  <script src="js/dispositivos-register.js"></script>
</body>
</html>
